<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock - MCQ</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
}

.container{
    max-width:800px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

h2{
    margin-bottom:10px;
}

.topic-list{
    margin-bottom:20px;
}

.topic-list div{
    margin:5px 0;
}

.question{
    margin-top:20px;
    font-weight:bold;
}

.options{
    list-style:none;
    padding:0;
}

.options li{
    margin:10px 0;
    padding:6px;
    border-radius:4px;
}

.options label{
    cursor:pointer;
}

.explanation{
    display:none;
    margin-top:10px;
    background:#f9fff3;
    padding:10px;
    border-left:4px solid green;
}

.nav{
    margin-top:20px;
    text-align:center;
}

.nav button{
    padding:6px 12px;
    margin:0 5px;
}

.correct{
    background:#4d6753;
    color:white;
}

.wrong{
    background:#ac0815;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h2>Exercise : Clock - General Questions</h2>

<div class="topic-list">
    <div>Clock - Formulas</div>
    <div><b>Clock - General Questions</b></div>
    <div>Clock - Data Sufficiency 1</div>
</div>
</div>

<div id="quiz-container"></div>

<div class="nav">
    <button onclick="prevPage()">Prev</button>
    <span id="pageNumbers"></span>
    <button onclick="nextPage()">Next</button>
</div>

<script>

// QUESTIONS
const questions = [
{
    question: "1. Which of the following term is used for a function defined inside a class?",
    options: ["Member Variable", "Member function", "Class function", "Classic function"],
    correct: 1,
    explanation: "A function defined inside a class is called a member function."
},
{
    question: "2. Which of the following concept of OOPS allows compiler to insert arguments in a function call if it is not specified?",
    options: ["Call by value", "Call by reference", "Default arguments", "Call by pointer"],
    correct: 2,
    explanation: "Default arguments allow the compiler to automatically provide values if arguments are not supplied during the function call."
},
{
    question: "3. How many instances of an abstract class can be created?",
    options: ["1", "5", "13", "0"],
    correct: 3,
    explanation: "Abstract classes cannot be instantiated directly, so zero instances can be created."
},
{
    question: "4. Which of the following cannot be friend?",
    options: ["Function", "Class", "Object", "Operator function"],
    correct: 2,
    explanation: "An object cannot be declared as friend. Only functions and classes can be declared as friend."
},
{
    question: "5. Which of the following concepts of OOPS means exposing only necessary information to client?",
    options: ["Encapsulation", "Abstraction", "Data hiding", "Data binding"],
    correct: 1,
    explanation: "Abstraction means exposing only essential information while hiding implementation details."
},
{
    question: "6. Which of the following type of class allows only one object of it to be created?",
    options: ["Virtual class", "Abstract class", "Singleton class", "Friend class"],
    correct: 2,
    explanation: "A Singleton class is designed so that only one object (instance) of the class can be created."
},
{
    question: "7. Which of the following is not a type of constructor?",
    options: ["Copy constructor", "Friend constructor", "Default constructor", "Parameterized constructor"],
    correct: 1,
    explanation: "There is no such constructor called a 'Friend constructor'. Friend is a keyword used for functions or classes, not constructors."
},
{
    question: "8. Which of the following statements is correct?",
    options: [
        "Base class pointer cannot point to derived class.",
        "Derived class pointer cannot point to base class.",
        "Pointer to derived class cannot be created.",
        "Pointer to base class cannot be created."
    ],
    correct: 1,
    explanation: "A base class pointer can point to a derived class object, but a derived class pointer cannot directly point to a base class object."
},
{
    question: "9. Which of the following is not the member of class?",
    options: ["Static function", "Friend function", "Const function", "Virtual function"],
    correct: 1,
    explanation: "Friend functions are not members of the class. They are external functions that are granted access to private and protected members."
},
{
    question: "10. Which of the following concepts means determining at runtime what method to invoke?",
    options: ["Data hiding", "Dynamic Typing", "Dynamic binding", "Dynamic loading"],
    correct: 2,
    explanation: "Dynamic binding (also called late binding) determines at runtime which method implementation should be executed."
},
{
    question: "11. Why reference is not same as a pointer?",
    options: [
        "A reference can never be null.",
        "A reference once established cannot be changed.",
        "Reference doesn't need an explicit dereferencing mechanism.",
        "All of the above."
    ],
    correct: 3,
    explanation: "References cannot be null, cannot be reseated after initialization, and do not require explicit dereferencing like pointers. Therefore, all statements are correct."
},
{
    question: "12. cout is a/an __________ .",
    options: ["operator", "function", "object", "macro"],
    correct: 2,
    explanation: "cout is an object of the ostream class defined in the iostream library."
},
{
    question: "13. Which of the following concepts provides facility of using object of one class inside another class?",
    options: ["Encapsulation", "Abstraction", "Composition", "Inheritance"],
    correct: 2,
    explanation: "Composition allows one class to contain an object of another class as a member."
},
{
    question: "14. How many types of polymorphisms are supported by C++?",
    options: ["1", "2", "3", "4"],
    correct: 1,
    explanation: "C++ supports two types of polymorphism: compile-time (function overloading, operator overloading, templates) and run-time (virtual functions)."
},
{
    question: "15. Which of the following is an abstract data type?",
    options: ["int", "double", "string", "Class"],
    correct: 3,
    explanation: "A class is an abstract data type because it defines data and operations without exposing implementation details."
},
{
    question: "16. Which of the following is correct about class and structure?",
    options: [
        "class can have member functions while structure cannot.",
        "class data members are public by default while that of structure are private.",
        "Pointer to structure or classes cannot be declared.",
        "class data members are private by default while that of structure are public by default."
    ],
    correct: 3,
    explanation: "In C++, class members are private by default, whereas structure members are public by default."
},
{
    question: "17. Which of the following concepts means wrapping up of data and functions together?",
    options: ["Abstraction", "Encapsulation", "Inheritance", "Polymorphism"],
    correct: 1,
    explanation: "Encapsulation refers to binding data and functions together into a single unit (class)."
},
{
    question: "18. Which of the following concepts means waiting until runtime to determine which function to call?",
    options: ["Data hiding", "Dynamic casting", "Dynamic binding", "Dynamic loading"],
    correct: 2,
    explanation: "Dynamic binding (late binding) determines at runtime which function implementation should be executed."
},
{
    question: "19. How 'Late binding' is implemented in C++?",
    options: [
        "Using C++ tables",
        "Using Virtual tables",
        "Using Indexed virtual tables",
        "Using polymorphic tables"
    ],
    correct: 1,
    explanation: "Late binding in C++ is implemented using Virtual Tables (vtable) for virtual functions."
},
{
    question: "20. Which of the following operator is overloaded for object cout?",
    options: [">>", "<<", "+", "="],
    correct: 1,
    explanation: "The insertion operator (<<) is overloaded for the cout object to output data to the standard output stream."
},
{
    question: "21. Which of the following concepts means adding new components to a program as it runs?",
    options: ["Data hiding", "Dynamic typing", "Dynamic binding", "Dynamic loading"],
    correct: 3,
    explanation: "Dynamic loading refers to adding new components (such as libraries or modules) to a program during execution."
},
{
    question: "22. Which of the following statement is correct?",
    options: [
        "A constructor is called at the time of declaration of an object.",
        "A constructor is called at the time of use of an object.",
        "A constructor is called at the time of declaration of a class.",
        "A constructor is called at the time of use of a class."
    ],
    correct: 0,
    explanation: "A constructor is automatically called when an object of a class is created (declared)."
},
{
    question: "23. Which of the following correctly describes overloading of functions?",
    options: [
        "Virtual polymorphism",
        "Transient polymorphism",
        "Ad-hoc polymorphism",
        "Pseudo polymorphism"
    ],
    correct: 2,
    explanation: "Function overloading is an example of compile-time (ad-hoc) polymorphism."
},
{
    question: "24. Which of the following approach is adapted by C++?",
    options: ["Top-down", "Bottom-up", "Right-left", "Left-right"],
    correct: 1,
    explanation: "C++ follows a bottom-up approach, which is characteristic of object-oriented programming."
},
{
    question: "25. Which of the following is correct about function overloading?",
    options: [
        "The types of arguments are different.",
        "The order of argument is different.",
        "The number of argument is same.",
        "Both A and B."
    ],
    correct: 3,
    explanation: "Function overloading can differ by type of arguments or by order of arguments (when types differ)."
},
{
    question: "26. Which of the following is the correct class of the object cout?",
    options: ["iostream", "istream", "ostream", "ifstream"],
    correct: 2,
    explanation: "cout is an object of the ostream class defined in the iostream library."
},
{
    question: "27. Which of the following cannot be used with the keyword virtual?",
    options: ["class", "member functions", "constructor", "destructor"],
    correct: 2,
    explanation: "Constructors cannot be declared virtual because they are not inherited and are called when the object is created."
},
{
    question: "28. Which of the following functions are performed by a constructor?",
    options: [
        "Construct a new class",
        "Construct a new object",
        "Construct a new function",
        "Initialize objects"
    ],
    correct: 3,
    explanation: "A constructor initializes the data members of a class when an object is created."
},
{
    question: "29. Which of the following problem causes an exception?",
    options: [
        "Missing semicolon in statement in main().",
        "A problem in calling function.",
        "A syntax error.",
        "A run-time error."
    ],
    correct: 3,
    explanation: "Exceptions occur due to run-time errors, not compile-time syntax errors."
},
{
    question: "30. Which one of the following options is correct about the statement given below? The compiler checks the type of reference in the object and not the type of object.",
    options: ["Inheritance", "Polymorphism", "Abstraction", "Encapsulation"],
    correct: 1,
    explanation: "This describes polymorphism, where method calls are resolved based on the reference type and dynamic binding."
},
{
    question: "31. Which of the following provides a reuse mechanism?",
    options: ["Abstraction", "Inheritance", "Dynamic binding", "Encapsulation"],
    correct: 1,
    explanation: "Inheritance provides a reuse mechanism by allowing a class to acquire properties and behaviors of another class."
},
{
    question: "32. Which of the following statement is correct?",
    options: [
        "Class is an instance of object.",
        "Object is an instance of a class.",
        "Class is an instance of data type.",
        "Object is an instance of data type."
    ],
    correct: 1,
    explanation: "An object is an instance of a class. A class defines the blueprint, and objects are created from that blueprint."
},
{
    question: "33. Which one of the following options is correct?",
    options: [
        "Friend function can access public data members of the class.",
        "Friend function can access protected data members of the class.",
        "Friend function can access private data members of the class.",
        "All of the above."
    ],
    correct: 3,
    explanation: "A friend function can access public, protected, and private members of the class in which it is declared as a friend."
},
{
    question: "34. Which of the following statements is correct in C++?",
    options: [
        "Classes cannot have data as protected members.",
        "Structures can have functions as members.",
        "Class members are public by default.",
        "Structure members are private by default."
    ],
    correct: 1,
    explanation: "In C++, structures can contain both data members and member functions."
},
{
    question: "35. Which of the following is used to make an abstract class?",
    options: [
        "Declaring it abstract using static keyword.",
        "Declaring it abstract using virtual keyword.",
        "Making at least one member function as virtual function.",
        "Making at least one member function as pure virtual function."
    ],
    correct: 3,
    explanation: "A class becomes abstract when it contains at least one pure virtual function."
},
{
    question: "36. Which of the following access specifier is used as a default in a class definition?",
    options: ["protected", "public", "private", "friend"],
    correct: 2,
    explanation: "In C++, class members are private by default."
},
{
    question: "37. What is correct about the static data member of a class?",
    options: [
        "A static member function can access only static data members of a class.",
        "A static data member is shared among all the object of the class.",
        "A static data member can be accessed directly from main().",
        "Both A and B."
    ],
    correct: 3,
    explanation: "Static member functions can access only static data members, and static data members are shared among all objects of the class."
},
{
    question: "38. Which of the following keyword is used to overload an operator?",
    options: ["overload", "operator", "friend", "override"],
    correct: 1,
    explanation: "The keyword 'operator' is used in C++ to overload operators."
},
{
    question: "39. What will happen if a class is not having any name?",
    options: [
        "It cannot have a destructor.",
        "It cannot have a constructor.",
        "It is not allowed.",
        "Both A and B."
    ],
    correct: 2,
    explanation: "In C++, a class must have a name. Anonymous classes are not allowed in standard class definitions."
},
{
    question: "40. Which inheritance type is used in the class given below? class A : public X, public Y {}",
    options: [
        "Multilevel inheritance",
        "Multiple inheritance",
        "Hybrid inheritance",
        "Hierarchical Inheritance"
    ],
    correct: 1,
    explanation: "When a class inherits from more than one base class, it is called multiple inheritance."
},
{
    question: "41. Which one of the following is correct about the statements given below? All function calls are resolved at compile-time in Procedure Oriented Programming. All function calls are resolved at compile-time in OOPS.",
    options: [
        "Only II is correct.",
        "Both I and II are correct.",
        "Only I is correct.",
        "Both I and II are incorrect."
    ],
    correct: 2,
    explanation: "In Procedure Oriented Programming, function calls are resolved at compile-time. In OOPS, function calls can be resolved at runtime due to polymorphism, so only statement I is correct."
},
{
    question: "42. Which of the following is an invalid visibility label while inheriting a class?",
    options: ["public", "private", "protected", "friend"],
    correct: 3,
    explanation: "While inheriting a class, the valid access specifiers are public, protected, and private. 'friend' is not a visibility label for inheritance."
}







  
];

const questionsPerPage = 10;
let currentPage = 1;

function loadQuestions() {

    const container = document.getElementById("quiz-container");
    container.innerHTML = "";

    const start = (currentPage - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const pageQuestions = questions.slice(start, end);

    pageQuestions.forEach((q, index) => {

        const questionNumber = start + index;

        const div = document.createElement("div");
        div.innerHTML = `
            <div class="question">${q.question}</div>
            <ul class="options">
                ${q.options.map((opt, i) => `
                    <li>
                        <label>
                            <input type="radio" name="q${questionNumber}" value="${i}">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </label>
                    </li>
                `).join("")}
            </ul>
            <button onclick="checkAnswer(${questionNumber}, ${q.correct}, \`${q.explanation}\`)">
                Check Answer
            </button>
            <div class="explanation" id="exp${questionNumber}"></div>
            <hr>
        `;
        container.appendChild(div);
    });

    createPageNumbers();
}

function checkAnswer(qIndex, correctIndex, explanationText) {

    const explanation = document.getElementById(`exp${qIndex}`);

    // TOGGLE SHOW/HIDE
    if (explanation.style.display === "block") {
        explanation.style.display = "none";
        return;
    }

    const selected = document.querySelector(`input[name="q${qIndex}"]:checked`);
    const options = document.querySelectorAll(`input[name="q${qIndex}"]`);

    if (!selected) {
        alert("Please select an option.");
        return;
    }

    let userLetter = "";
    let correctLetter = "";

    options.forEach(option => {
        const li = option.closest("li");
        const letter = String.fromCharCode(65 + parseInt(option.value));

        // Reset colors
        li.classList.remove("correct", "wrong");

        if (parseInt(option.value) === correctIndex) {
            li.classList.add("correct");
            correctLetter = letter;
        }

        if (option.checked) {
            userLetter = letter;

            if (parseInt(option.value) !== correctIndex) {
                li.classList.add("wrong");
            }
        }
    });

    explanation.innerHTML = `
        <p style="font-weight:bold;">
            ${parseInt(selected.value) === correctIndex ? "✔ Correct Answer!" : "❌ Wrong Answer!"}
        </p>
        <p><b>Your Option:</b> ${userLetter}</p>
        <p><b>Correct Option:</b> ${correctLetter}</p>
        <p><b>Explanation:</b> ${explanationText}</p>
    `;

    explanation.style.display = "block";
}

function createPageNumbers() {
    const totalPages = Math.ceil(questions.length / questionsPerPage);
    const pageNumbers = document.getElementById("pageNumbers");
    pageNumbers.innerHTML = "";

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.innerText = i;
        btn.onclick = () => {
            currentPage = i;
            loadQuestions();
        };

        if (i === currentPage) {
            btn.style.background = "#333";
            btn.style.color = "white";
        }

        pageNumbers.appendChild(btn);
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadQuestions();
    }
}

function nextPage() {
    const totalPages = Math.ceil(questions.length / questionsPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        loadQuestions();
    }
}

loadQuestions();

</script>


</body>
</html>
