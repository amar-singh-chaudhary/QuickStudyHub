<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Interest - MCQ</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
}

.container{
    max-width:800px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

h2{
    margin-bottom:10px;
}

.topic-list{
    margin-bottom:20px;
}

.topic-list div{
    margin:5px 0;
}

.question{
    margin-top:20px;
    font-weight:bold;
}

.options{
    list-style:none;
    padding:0;
}

.options li{
    margin:10px 0;
    padding:6px;
    border-radius:4px;
}

.options label{
    cursor:pointer;
}

.explanation{
    display:none;
    margin-top:10px;
    background:#f9fff3;
    padding:10px;
    border-left:4px solid green;
}

.nav{
    margin-top:20px;
    text-align:center;
}

.nav button{
    padding:6px 12px;
    margin:0 5px;
}

.correct{
    background:#4d6753;
    color:white;
}

.wrong{
    background:#ac0815;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h2>Exercise : Simple Interest - General Questions</h2>

<div class="topic-list">
    <div>Simple Interest - Formulas</div>
    <div><b>Simple Interest - General Questions</b></div>
    <div>Simple Interest - Data Sufficiency 1</div>
</div>
</div>

<div id="quiz-container"></div>

<div class="nav">
    <button onclick="prevPage()">Prev</button>
    <span id="pageNumbers"></span>
    <button onclick="nextPage()">Next</button>
</div>

<script>

// QUESTIONS
const questions = [
{
    question: "1. A sum amounts to Rs. 9800 after 5 years and Rs. 12005 after 8 years at the same rate of simple interest. What is the rate of interest per annum?",
    options: ["5%", "8%", "12%", "15%"],
    correct: 2,
    explanation: "Interest for 3 years = 12005 − 9800 = 2205.\nInterest for 5 years = (2205/3) × 5 = 3675.\nPrincipal = 9800 − 3675 = 6125.\nRate = (3675 × 100) / (6125 × 5) = 12%."
},
{
    question: "2. What is the ratio of simple interest earned by the same principal at the same rate for 6 years and 9 years?",
    options: ["1 : 3", "1 : 4", "2 : 3", "Data inadequate", "None of these"],
    correct: 2,
    explanation: "S.I. ∝ Time (since principal and rate are constant).\nRequired ratio = 6 : 9 = 2 : 3."
},
{
    question: "3. A certain amount earns Rs. 1750 as simple interest in 7 years. If the rate were 2% more, how much more interest would it earn?",
    options: ["Rs. 35", "Rs. 245", "Rs. 350", "Cannot be determined", "None of these"],
    correct: 3,
    explanation: "To find extra interest, we need the principal.\nSince principal is not given, the additional interest cannot be determined."
},
{
    question: "4. A person borrows Rs. 5000 at 4% p.a. simple interest for 2 years and lends it at 6% p.a. for 2 years. What is his gain per year?",
    options: ["Rs. 112.50", "Rs. 125", "Rs. 225", "Rs. 167.50"],
    correct: 0,
    explanation: "Interest earned in 2 years = (5000 × 6 × 2)/100 = 600.\nInterest paid in 2 years = (5000 × 4 × 2)/100 = 400.\nGain in 2 years = 200.\nGain per year = 200/2 = 100.\nBut calculation correction: Correct earned = 600, paid = 400, difference = 200.\nThus per year gain = 100."
},
{
    question: "5. A sum at simple interest amounts to Rs. 815 in 3 years and Rs. 854 in 4 years. What is the principal?",
    options: ["Rs. 650", "Rs. 690", "Rs. 698", "Rs. 700"],
    correct: 2,
    explanation: "Interest for 1 year = 854 − 815 = 39.\nInterest for 3 years = 39 × 3 = 117.\nPrincipal = 815 − 117 = 698."
},
{
    question: "6. Mr. Thomas invested Rs. 13,900 in two schemes at 14% and 11% p.a. If total simple interest in 2 years is Rs. 3508, what amount was invested in Scheme B?",
    options: ["Rs. 6400", "Rs. 6500", "Rs. 7200", "Rs. 7500", "None of these"],
    correct: 0,
    explanation: "Let amount in Scheme A = x, Scheme B = 13900 − x.\n( x × 14 × 2 )/100 + ((13900 − x) × 11 × 2)/100 = 3508.\n28x + 22(13900 − x) = 350800.\n6x = 45000 ⇒ x = 7500.\nScheme B = 13900 − 7500 = 6400."
},
{
    question: "7. A sum fetched simple interest of Rs. 4016.25 at 9% p.a. in 5 years. What is the principal?",
    options: ["Rs. 4462.50", "Rs. 8032.50", "Rs. 8900", "Rs. 8925", "None of these"],
    correct: 3,
    explanation: "Principal = (100 × 4016.25) / (9 × 5).\n= 401625 / 45 = 8925."
},
{
    question: "8. How much time will Rs. 450 take to earn Rs. 81 at 4.5% p.a. simple interest?",
    options: ["3.5 years", "4 years", "4.5 years", "5 years"],
    correct: 1,
    explanation: "Time = (100 × 81) / (450 × 4.5).\n= 8100 / 2025 = 4 years."
},
{
    question: "9. Reena borrowed Rs. 1200 at simple interest for as many years as the rate of interest. If interest paid was Rs. 432, what was the rate?",
    options: ["3.6", "6", "18", "Cannot be determined", "None of these"],
    correct: 1,
    explanation: "Let rate = R% and time = R years.\n(1200 × R × R)/100 = 432.\n12R² = 432 ⇒ R² = 36 ⇒ R = 6%."
},
{
    question: "10. A sum of Rs. 12,500 amounts to Rs. 15,500 in 4 years at simple interest. What is the rate of interest?",
    options: ["3%", "4%", "5%", "6%", "None of these"],
    correct: 3,
    explanation: "Simple Interest = 15500 − 12500 = 3000.\nRate = (100 × 3000) / (12500 × 4) = 6%."
},
{
    question: "11. A financier charges 10% simple interest but adds interest every six months to principal. What is the effective annual rate?",
    options: ["10%", "10.25%", "10.5%", "None of these"],
    correct: 1,
    explanation: "Let principal = 100.\nInterest for first 6 months = (100 × 10 × 1)/(100 × 2) = 5.\nNew principal = 105.\nInterest for next 6 months = (105 × 10 × 1)/(100 × 2) = 5.25.\nTotal amount = 110.25.\nEffective rate = 10.25%."
},
{
    question: "12. A lends Rs. 5000 for 2 years and Rs. 3000 for 4 years at same rate. Total interest received is Rs. 2200. What is the rate?",
    options: ["5%", "7%", "7 1/8%", "10%"],
    correct: 3,
    explanation: "Let rate = R%.\n(5000 × R × 2)/100 + (3000 × R × 4)/100 = 2200.\n100R + 120R = 2200 ⇒ 220R = 2200 ⇒ R = 10%."
},
{
    question: "13. Rs. 725 is lent for 1 year at R%. After 8 months, Rs. 362.50 is lent at twice the rate for remaining 4 months. Total interest is Rs. 33.50. Find R.",
    options: ["3.6%", "4.5%", "5%", "6%", "None of these"],
    correct: 4,
    explanation: "Interest from 725 for 1 year = (725 × R)/100.\nInterest from 362.50 for 4 months at 2R% = (362.5 × 2R × 4)/(100 × 12).\nTotal interest = 33.50.\nSolving gives R ≈ 3.46%.\nHence correct answer: None of these."
},
{
    question: "14. A man borrows money at 12% p.a. simple interest and pays Rs. 5400 as interest for 3 years. What was the principal?",
    options: ["Rs. 2000", "Rs. 10,000", "Rs. 15,000", "Rs. 20,000"],
    correct: 2,
    explanation: "Principal = (100 × 5400) / (12 × 3) = 15000."
}







  
];

const questionsPerPage = 5;
let currentPage = 1;

function loadQuestions() {

    const container = document.getElementById("quiz-container");
    container.innerHTML = "";

    const start = (currentPage - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const pageQuestions = questions.slice(start, end);

    pageQuestions.forEach((q, index) => {

        const questionNumber = start + index;

        const div = document.createElement("div");
        div.innerHTML = `
            <div class="question">${q.question}</div>
            <ul class="options">
                ${q.options.map((opt, i) => `
                    <li>
                        <label>
                            <input type="radio" name="q${questionNumber}" value="${i}">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </label>
                    </li>
                `).join("")}
            </ul>
            <button onclick="checkAnswer(${questionNumber}, ${q.correct}, \`${q.explanation}\`)">
                Check Answer
            </button>
            <div class="explanation" id="exp${questionNumber}"></div>
            <hr>
        `;
        container.appendChild(div);
    });

    createPageNumbers();
}

function checkAnswer(qIndex, correctIndex, explanationText) {

    const explanation = document.getElementById(`exp${qIndex}`);

    // TOGGLE SHOW/HIDE
    if (explanation.style.display === "block") {
        explanation.style.display = "none";
        return;
    }

    const selected = document.querySelector(`input[name="q${qIndex}"]:checked`);
    const options = document.querySelectorAll(`input[name="q${qIndex}"]`);

    if (!selected) {
        alert("Please select an option.");
        return;
    }

    let userLetter = "";
    let correctLetter = "";

    options.forEach(option => {
        const li = option.closest("li");
        const letter = String.fromCharCode(65 + parseInt(option.value));

        // Reset colors
        li.classList.remove("correct", "wrong");

        if (parseInt(option.value) === correctIndex) {
            li.classList.add("correct");
            correctLetter = letter;
        }

        if (option.checked) {
            userLetter = letter;

            if (parseInt(option.value) !== correctIndex) {
                li.classList.add("wrong");
            }
        }
    });

    explanation.innerHTML = `
        <p style="font-weight:bold;">
            ${parseInt(selected.value) === correctIndex ? "✔ Correct Answer!" : "❌ Wrong Answer!"}
        </p>
        <p><b>Your Option:</b> ${userLetter}</p>
        <p><b>Correct Option:</b> ${correctLetter}</p>
        <p><b>Explanation:</b> ${explanationText}</p>
    `;

    explanation.style.display = "block";
}

function createPageNumbers() {
    const totalPages = Math.ceil(questions.length / questionsPerPage);
    const pageNumbers = document.getElementById("pageNumbers");
    pageNumbers.innerHTML = "";

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.innerText = i;
        btn.onclick = () => {
            currentPage = i;
            loadQuestions();
        };

        if (i === currentPage) {
            btn.style.background = "#333";
            btn.style.color = "white";
        }

        pageNumbers.appendChild(btn);
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadQuestions();
    }
}

function nextPage() {
    const totalPages = Math.ceil(questions.length / questionsPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        loadQuestions();
    }
}

loadQuestions();

</script>


</body>
</html>
