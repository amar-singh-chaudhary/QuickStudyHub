<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time and Distance - MCQ</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
}

.container{
    max-width:800px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

h2{
    margin-bottom:10px;
}

.topic-list{
    margin-bottom:20px;
}

.topic-list div{
    margin:5px 0;
}

.question{
    margin-top:20px;
    font-weight:bold;
}

.options{
    list-style:none;
    padding:0;
}

.options li{
    margin:10px 0;
    padding:6px;
    border-radius:4px;
}

.options label{
    cursor:pointer;
}

.explanation{
    display:none;
    margin-top:10px;
    background:#f9fff3;
    padding:10px;
    border-left:4px solid green;
}

.nav{
    margin-top:20px;
    text-align:center;
}

.nav button{
    padding:6px 12px;
    margin:0 5px;
}

.correct{
    background:#4d6753;
    color:white;
}

.wrong{
    background:#ac0815;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h2>Exercise : Time and Distance - General Questions</h2>

<div class="topic-list">
    <div> Time and Distance - Formulas</div>
    <div><b>Time and Distance - General Questions</b></div>
    <div>Time and Distance - Data Sufficiency 1</div>
</div>
</div>

<div id="quiz-container"></div>

<div class="nav">
    <button onclick="prevPage()">Prev</button>
    <span id="pageNumbers"></span>
    <button onclick="nextPage()">Next</button>
</div>

<script>

// QUESTIONS
const questions = [
{
    question: "1. A person crosses a 600 m long street in 5 minutes. What is his speed in km per hour?",
    options: ["3.6", "7.2", "8.4", "10"],
    correct: 1,
    explanation: "Speed = 600 / (5 × 60) = 2 m/sec → 2 × 18/5 = 7.2 km/hr"
},
{
    question: "2. A man covered a certain distance at some speed. Had he moved 3 kmph faster, he would have taken 40 minutes less. If he had moved 2 kmph slower, he would have taken 40 minutes more. The distance (in km) is:",
    options: ["35", "36 2/3", "37 1/2", "40"],
    correct: 3,
    explanation: "Let distance = x km and speed = y kmph. From conditions: 2y(y + 3) = 9x and y(y - 2) = 3x. Dividing both equations gives x = 40 km."
},

{
    question: "3. A farmer travelled a distance of 61 km in 9 hours. He travelled partly on foot @ 4 km/hr and partly on bicycle @ 9 km/hr. The distance travelled on foot is:",
    options: ["14 km", "15 km", "16 km", "17 km"],
    correct: 2,
    explanation: "Let distance on foot = x km. Then distance on bicycle = (61 - x) km. So, x/4 + (61 - x)/9 = 9. Solving: 9x + 4(61 - x) = 324 → 5x = 80 → x = 16 km."
},
{
    question: "4. A 600 km journey takes 8 hours if 120 km is done by train and the rest by car. It takes 20 minutes more if 200 km is done by train and the rest by car. The ratio of the speed of the train to that of the car is:",
    options: ["2 : 3", "3 : 2", "3 : 4", "4 : 3"],
    correct: 2,
    explanation: "Let speed of train = x km/hr and speed of car = y km/hr. Then 120/x + 480/y = 8 and 200/x + 400/y = 25/3. Solving the equations gives x = 60 and y = 80. Ratio = 60 : 80 = 3 : 4."
},
{
    question: "5. Robert is travelling on his cycle and has calculated that he will reach point A at 2 P.M. if he travels at 10 kmph, and at 12 noon if he travels at 15 kmph. At what speed must he travel to reach A at 1 P.M.?",
    options: ["8 kmph", "11 kmph", "12 kmph", "14 kmph"],
    correct: 2,
    explanation: "Let distance = x km. Then x/10 - x/15 = 2 hours. Solving: (3x - 2x)/30 = 2 → x = 60 km. Time at 10 kmph = 60/10 = 6 hrs, so he started at 8 A.M. To reach at 1 P.M., time taken = 5 hrs. Required speed = 60/5 = 12 kmph."
},
{
    question: "6. In covering a distance of 30 km, Abhay takes 2 hours more than Sameer. If Abhay doubles his speed, then he would take 1 hour less than Sameer. Abhay's speed is:",
    options: ["5 kmph", "6 kmph", "6.25 kmph", "7.5 kmph"],
    correct: 0,
    explanation: "Let Abhay's speed = x kmph. Time taken by Abhay = 30/x and at double speed = 30/2x. Given: 30/x - 30/2x = 3. Solving: (60 - 30)/2x = 3 → 30/2x = 3 → 6x = 30 → x = 5 kmph."
},

{
    question: "7. In a flight of 600 km, an aircraft was slowed down due to bad weather. Its average speed for the trip was reduced by 200 km/hr and the time of flight increased by 30 minutes. The duration of the flight is:",
    options: ["1 hour", "2 hours", "3 hours", "4 hours"],
    correct: 0,
    explanation: "Let original duration = x hours. Then 600/x - 600/(x + 1/2) = 200. Solving: 600/x - 1200/(2x + 1) = 200 → x(2x + 1) = 3 → 2x² + x - 3 = 0 → (2x + 3)(x - 1) = 0 → x = 1 hour (rejecting negative value)."
},
{
    question: "8. A man completes a journey in 10 hours. He travels the first half of the journey at 21 km/hr and the second half at 24 km/hr. Find the total journey in km:",
    options: ["220 km", "224 km", "230 km", "234 km"],
    correct: 1,
    explanation: "Let total distance = x km. Then (x/2)/21 + (x/2)/24 = 10. So, x/42 + x/48 = 10. Taking LCM: (8x + 7x)/336 = 10 → 15x = 3360 → x = 224 km."
},
{
    question: "9. The ratio between the speeds of two trains is 7 : 8. If the second train runs 400 km in 4 hours, then the speed of the first train is:",
    options: ["70 km/hr", "75 km/hr", "84 km/hr", "87.5 km/hr"],
    correct: 3,
    explanation: "Let speeds be 7x and 8x km/hr. Given 8x = 400/4 = 100 → x = 12.5. Speed of first train = 7 × 12.5 = 87.5 km/hr."
},
{
    question: "10. A man on tour travels first 160 km at 64 km/hr and the next 160 km at 80 km/hr. The average speed for the first 320 km of the tour is:",
    options: ["35.55 km/hr", "36 km/hr", "71.11 km/hr", "71 km/hr"],
    correct: 2,
    explanation: "Time taken = 160/64 + 160/80 = 2.5 + 2 = 4.5 hours (9/2 hrs). Average speed = Total distance / Total time = 320 ÷ (9/2) = 320 × 2/9 = 71.11 km/hr."
},
{
    question: "11. A car travelling with 5/7 of its actual speed covers 42 km in 1 hr 40 min 48 sec. Find the actual speed of the car:",
    options: ["17 6/7 km/hr", "25 km/hr", "30 km/hr", "35 km/hr"],
    correct: 3,
    explanation: "Time = 1 hr 40 min 48 sec = 1 + 40/60 + 48/3600 = 1.68 hrs = 126/75 hrs. Let actual speed = x km/hr. Given (5/7)x × (126/75) = 42. Solving: x = (42 × 7 × 75) / (5 × 126) = 35 km/hr."
},
{
    question: "12. Excluding stoppages, the speed of a bus is 54 kmph and including stoppages, it is 45 kmph. For how many minutes does the bus stop per hour?",
    options: ["9", "10", "12", "20"],
    correct: 1,
    explanation: "In 1 hour, distance without stoppage = 54 km, with stoppage = 45 km. Loss in distance = 9 km. Time to cover 9 km at 54 kmph = (9/54) × 60 = 10 minutes."
},
{
    question: "13. A train can travel 50% faster than a car. Both start from point A at the same time and reach point B, 75 km away, at the same time. On the way, the train lost 12.5 minutes while stopping at stations. The speed of the car is:",
    options: ["100 kmph", "110 kmph", "120 kmph", "130 kmph"],
    correct: 2,
    explanation: "Let speed of car = x kmph. Then speed of train = 3x/2 kmph. Given 75/x - 75/(3x/2) = 12.5/60. Solving: 75/x - 50/x = 5/24 → 25/x = 5/24 → x = 120 kmph."
},
{
    question: "14. If a person walks at 14 km/hr instead of 10 km/hr, he would have walked 20 km more. The actual distance travelled by him is:",
    options: ["50 km", "56 km", "70 km", "80 km"],
    correct: 0,
    explanation: "Let actual distance = x km. Then x/10 = (x + 20)/14. Solving: 14x = 10x + 200 → 4x = 200 → x = 50 km."
},



];

const questionsPerPage = 5;
let currentPage = 1;

function loadQuestions() {

    const container = document.getElementById("quiz-container");
    container.innerHTML = "";

    const start = (currentPage - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const pageQuestions = questions.slice(start, end);

    pageQuestions.forEach((q, index) => {

        const questionNumber = start + index;

        const div = document.createElement("div");
        div.innerHTML = `
            <div class="question">${q.question}</div>
            <ul class="options">
                ${q.options.map((opt, i) => `
                    <li>
                        <label>
                            <input type="radio" name="q${questionNumber}" value="${i}">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </label>
                    </li>
                `).join("")}
            </ul>
            <button onclick="checkAnswer(${questionNumber}, ${q.correct}, \`${q.explanation}\`)">
                Check Answer
            </button>
            <div class="explanation" id="exp${questionNumber}"></div>
            <hr>
        `;
        container.appendChild(div);
    });

    createPageNumbers();
}

function checkAnswer(qIndex, correctIndex, explanationText) {

    const explanation = document.getElementById(`exp${qIndex}`);

    // TOGGLE SHOW/HIDE
    if (explanation.style.display === "block") {
        explanation.style.display = "none";
        return;
    }

    const selected = document.querySelector(`input[name="q${qIndex}"]:checked`);
    const options = document.querySelectorAll(`input[name="q${qIndex}"]`);

    if (!selected) {
        alert("Please select an option.");
        return;
    }

    let userLetter = "";
    let correctLetter = "";

    options.forEach(option => {
        const li = option.closest("li");
        const letter = String.fromCharCode(65 + parseInt(option.value));

        // Reset colors
        li.classList.remove("correct", "wrong");

        if (parseInt(option.value) === correctIndex) {
            li.classList.add("correct");
            correctLetter = letter;
        }

        if (option.checked) {
            userLetter = letter;

            if (parseInt(option.value) !== correctIndex) {
                li.classList.add("wrong");
            }
        }
    });

    explanation.innerHTML = `
        <p style="font-weight:bold;">
            ${parseInt(selected.value) === correctIndex ? "✔ Correct Answer!" : "❌ Wrong Answer!"}
        </p>
        <p><b>Your Option:</b> ${userLetter}</p>
        <p><b>Correct Option:</b> ${correctLetter}</p>
        <p><b>Explanation:</b> ${explanationText}</p>
    `;

    explanation.style.display = "block";
}

function createPageNumbers() {
    const totalPages = Math.ceil(questions.length / questionsPerPage);
    const pageNumbers = document.getElementById("pageNumbers");
    pageNumbers.innerHTML = "";

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.innerText = i;
        btn.onclick = () => {
            currentPage = i;
            loadQuestions();
        };

        if (i === currentPage) {
            btn.style.background = "#333";
            btn.style.color = "white";
        }

        pageNumbers.appendChild(btn);
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadQuestions();
    }
}

function nextPage() {
    const totalPages = Math.ceil(questions.length / questionsPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        loadQuestions();
    }
}

loadQuestions();

</script>


</body>
</html>
