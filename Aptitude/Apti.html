<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Question Mock Test</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.question-block{
    margin-bottom:25px;
    padding-bottom:15px;
    border-bottom:1px solid #ddd;
}

.options div{
    padding:8px;
    margin:6px 0;
    border:1px solid #ddd;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
    position:relative;
}

.options div.blur{
    opacity:0.4;
}

.options div.correct{
    background:#e6f7e6;
    border-color:#4CAF50;
}

.options div.correct::after{
    content:"✔";
    color:#4CAF50;
    font-weight:bold;
    position:absolute;
    right:10px;
}

.options div.wrong{
    background:#ffe6e6;
    border-color:red;
}

button{
    margin-top:8px;
    padding:6px 12px;
    border:none;
    background:#4CAF50;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

.result{
    margin-top:10px;
    padding:8px;
    background:#f9f9f9;
    border-radius:5px;
    display:none;
}

#pagination{
    text-align:center;
    margin-top:20px;
}

#pagination button{
    margin:5px;
    padding:6px 12px;
    border:none;
    background:#4CAF50;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

#pagination button:hover{
    background:#388e3c;
}

</style>
</head>
<body>
<div class="container">

<h2>Exercise : Time and Distance - General Questions</h2>

<div class="topic-list">
    <div>Time and Distance - Formulas</div>
    <div><b>Time and Distance - General Questions</b></div>
    <div>Time and Distance - Data Sufficiency 1</div>
</div>

</div>
<div class="container" id="questionContainer"></div>
<div id="pagination"></div>



<script>
let currentPage = 1;
const questionsPerPage = 20;

// 🔹 YOUR 20 QUESTIONS ARRAY
const questions = [

{
q:"1. A person crosses a 600 m long street in 5 minutes. What is his speed in km per hour?",
options:["3.6","7.2","8.4","10"],
answer:1
},

{
q:"2. An aeroplane covers a certain distance at 240 kmph in 5 hours. To cover the same distance in 1 hour, speed?",
options:["300 kmph","360 kmph","600 kmph","720 kmph"],
answer:2
},

{
q:"3. If a person walks at 14 km/hr instead of 10 km/hr, he would have walked 20 km more. Actual distance?",
options:["50 km","56 km","70 km","80 km"],
answer:2
},

{
q:"4. A train travels 50% faster than a car. Distance is 75 km. Train lost 12.5 minutes. Speed of car?",
options:["100 kmph","110 kmph","120 kmph","130 kmph"],
answer:2
},

{
q:"5. Excluding stoppages speed of bus is 54 kmph and including stoppages 45 kmph. Stop time per hour?",
options:["9 min","10 min","12 min","20 min"],
answer:1
},

{
q:"6. A car travels 180 km in 3 hours. What is its speed?",
options:["50 kmph","60 kmph","70 kmph","80 kmph"],
answer:1
},

{
q:"7. A train 100 m long crosses a pole in 10 seconds. Speed?",
options:["36 kmph","40 kmph","45 kmph","50 kmph"],
answer:0
},

{
q:"8. A man walks 5 km in 1 hour. How far in 3 hours?",
options:["10 km","12 km","15 km","18 km"],
answer:2
},

{
q:"9. A train crosses a 200 m platform in 20 seconds. Speed?",
options:["36 kmph","45 kmph","54 kmph","60 kmph"],
answer:2
},

{
q:"10. A bus travels at 60 kmph for 2 hours. Distance?",
options:["100 km","110 km","120 km","130 km"],
answer:2
},

{
q:"11. A person covers 150 km in 5 hours. Speed?",
options:["20 kmph","25 kmph","30 kmph","35 kmph"],
answer:2
},

{
q:"12. A cyclist travels 45 km in 3 hours. Speed?",
options:["10 kmph","15 kmph","20 kmph","25 kmph"],
answer:1
},

{
q:"13. A train 150 m long passes a pole in 15 sec. Speed?",
options:["36 kmph","40 kmph","45 kmph","54 kmph"],
answer:0
},

{
q:"14. A man runs at 12 kmph. Distance in 30 minutes?",
options:["5 km","6 km","7 km","8 km"],
answer:1
},

{
q:"15. A car covers 300 km in 5 hours. Speed?",
options:["50 kmph","55 kmph","60 kmph","65 kmph"],
answer:2
},

{
q:"16. A train travels 600 km in 8 hours. Speed?",
options:["65 kmph","70 kmph","75 kmph","80 kmph"],
answer:2
},

{
q:"17. A boat travels 90 km in 3 hours. Speed?",
options:["20 kmph","25 kmph","30 kmph","35 kmph"],
answer:2
},

{
q:"18. A man walks at 4 kmph. Time to cover 20 km?",
options:["4 hr","5 hr","6 hr","7 hr"],
answer:1
},

{
q:"19. A bus travels 150 km at 50 kmph. Time?",
options:["2 hr","3 hr","4 hr","5 hr"],
answer:1
},

{
q:"20. A train runs 240 km in 4 hours. Speed?",
options:["50 kmph","55 kmph","60 kmph","65 kmph"],
answer:2
},
// Question 21
{
q:"21. Sample Question?",
options:["A","B","C","D"],
answer:2
},{
q:"What will be the output?",
code:`#include <stdio.h>
int main()
{
int a[5]={5,1,15,20,25};
int i,j,m;
i=++a[1];
j=a[1]++;
m=a[i++];
printf("%d,%d,%d",i,j,m);
}`,
options:["2,1,15","1,2,5","3,2,15","2,3,20"],
answer:3,
explanation:"a[1] becomes 2. i=2, j=2, m=a[2]=15, then i becomes 3. So correct answer is 2,3,20."
},

// add here more questions as needed...........


];


// 🔹 STORE USER ANSWERS
let userAnswers = {};

// 🔹 LOAD QUESTIONS
function loadQuestions(){

const container = document.getElementById("questionContainer");
container.innerHTML="";

let start = (currentPage - 1) * questionsPerPage;
let end = start + questionsPerPage;

let pageQuestions = questions.slice(start, end);

pageQuestions.forEach((q,index)=>{

let realIndex = start + index;

let block = document.createElement("div");
block.className="question-block";

block.innerHTML=`
<strong>${q.q}</strong>
<div class="options" id="options${realIndex}">
${q.options.map((opt,i)=>`<div onclick="selectOption(${realIndex},${i})">${opt}</div>`).join("")}
</div>
<button id="btn${realIndex}" onclick="toggleAnswer(${realIndex})">
    Show Answer
</button>

<div class="result" id="result${realIndex}"></div>
`;

container.appendChild(block);

});

renderPagination();
}

// Add Pagination function
function renderPagination(){

let totalPages = Math.ceil(questions.length / questionsPerPage);
let pagination = document.getElementById("pagination");

pagination.innerHTML="";

if(currentPage > 1){
pagination.innerHTML += `<button onclick="changePage(${currentPage-1})">Prev</button>`;
}

for(let i=1;i<=totalPages;i++){
pagination.innerHTML += `<button onclick="changePage(${i})">${i}</button>`;
}

if(currentPage < totalPages){
pagination.innerHTML += `<button onclick="changePage(${currentPage+1})">Next</button>`;
}
}

// Add Change Page function
function changePage(page){
currentPage = page;
loadQuestions();
window.scrollTo(0,0);
}


// 🔹 OPTION SELECT
function selectOption(qIndex,optIndex){

let correctIndex = questions[qIndex].answer;
let options=document.querySelectorAll(`#options${qIndex} div`);

userAnswers[qIndex]=optIndex;

// Reset
options.forEach(o=>{
o.classList.remove("correct","wrong","blur");
});

// If correct
if(optIndex===correctIndex){

options[optIndex].classList.add("correct");

// Remove blur from others
options.forEach(o=>o.classList.remove("blur"));

}else{

options[optIndex].classList.add("wrong");

// Blur other options
options.forEach((o,i)=>{
if(i!==optIndex){
o.classList.add("blur");
}
});

}

}

// 🔹 SHOW ANSWER BUTTON
function toggleAnswer(qIndex){

let correctIndex = questions[qIndex].answer;
let resultBox = document.getElementById(`result${qIndex}`);
let options = document.querySelectorAll(`#options${qIndex} div`);
let button = document.getElementById(`btn${qIndex}`);

let userIndex = userAnswers[qIndex];

// 🔥 IF ALREADY VISIBLE → HIDE
if(resultBox.style.display === "block"){
    resultBox.style.display = "none";
    button.innerText = "Show Answer";
    return;
}

// 🔥 OTHERWISE SHOW ANSWER

options.forEach(o => o.classList.remove("blur"));

// Always highlight correct
options[correctIndex].classList.add("correct");

let resultHTML = "";

if(userIndex !== undefined){

let userText = questions[qIndex].options[userIndex];
let correctText = questions[qIndex].options[correctIndex];

if(userIndex === correctIndex){

resultHTML = `
<b>Your Answer:</b> ${userText} <br>
<b>Correct Answer:</b> ${correctText} <br>
✅ Result: Correct
`;

}else{

resultHTML = `
<b>Your Answer:</b> ${userText} <br>
<b>Correct Answer:</b> ${correctText} <br>
❌ Result: Incorrect
`;

}

}else{

resultHTML = `
<b>You did not select any option.</b><br>
<b>Correct Answer:</b> ${questions[qIndex].options[correctIndex]}
`;

}

resultBox.innerHTML = resultHTML;
resultBox.style.display = "block";
button.innerText = "Hide Answer";

}

loadQuestions();

</script>

</body>
</html>
